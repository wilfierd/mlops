apiVersion: v1
kind: Namespace
metadata:
  name: llm-chat
---
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: llm-chat
  namespace: llm-chat
spec:
  serviceUnhealthySecondThreshold: 900
  deploymentUnhealthySecondThreshold: 300
  serveConfigV2: |
    proxy_location: EveryNode
    http_options:
      host: 0.0.0.0
      port: 8000
    applications:
      - name: llm-chat
        import_path: app.server:chat_app
        route_prefix: /
        deployments:
          - name: ChatModel
            max_ongoing_requests: 1
            autoscaling_config:
              min_replicas: 1
              initial_replicas: 1
              max_replicas: 3
              target_ongoing_requests: 1
              upscale_delay_s: 10
              downscale_delay_s: 120
            ray_actor_options:
              num_cpus: 3
  rayClusterConfig:
    rayVersion: "2.55.1"
    enableInTreeAutoscaling: true
    autoscalerOptions:
      upscalingMode: Default
      idleTimeoutSeconds: 120
    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "0"
      template:
        spec:
          containers:
            - name: ray-head
              image: llm-chat-ray:0.1.0
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 6379
                  name: gcs
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
              env:
                - name: MODEL_ID
                  value: HuggingFaceTB/SmolLM2-135M-Instruct
                - name: MODEL_DTYPE
                  value: bfloat16
                - name: MAX_NEW_TOKENS
                  value: "160"
                - name: MAX_INPUT_TOKENS
                  value: "2048"
                - name: TORCH_NUM_THREADS
                  value: "3"
                - name: MODEL_NUM_CPUS
                  value: "3"
                - name: MAX_ONGOING_REQUESTS
                  value: "1"
                - name: GRPC_DNS_RESOLVER
                  value: native
                - name: HF_HOME
                  value: /tmp/huggingface
              resources:
                requests:
                  cpu: "2"
                  memory: 3Gi
                limits:
                  cpu: "3"
                  memory: 4Gi
              volumeMounts:
                - name: hf-cache
                  mountPath: /tmp/huggingface
          volumes:
            - name: hf-cache
              emptyDir: {}
    workerGroupSpecs:
      - groupName: cpu-workers
        minReplicas: 1
        maxReplicas: 3
        rayStartParams: {}
        template:
          spec:
            terminationGracePeriodSeconds: 60
            containers:
              - name: ray-worker
                image: llm-chat-ray:0.1.0
                imagePullPolicy: IfNotPresent
                env:
                  - name: MODEL_ID
                    value: HuggingFaceTB/SmolLM2-135M-Instruct
                  - name: MODEL_DTYPE
                    value: bfloat16
                  - name: MAX_NEW_TOKENS
                    value: "160"
                  - name: MAX_INPUT_TOKENS
                    value: "2048"
                  - name: TORCH_NUM_THREADS
                    value: "3"
                  - name: MODEL_NUM_CPUS
                    value: "3"
                  - name: MAX_ONGOING_REQUESTS
                    value: "1"
                  - name: GRPC_DNS_RESOLVER
                    value: native
                  - name: HF_HOME
                    value: /tmp/huggingface
                resources:
                  requests:
                    cpu: "3"
                    memory: 3Gi
                  limits:
                    cpu: "4"
                    memory: 5Gi
                volumeMounts:
                  - name: hf-cache
                    mountPath: /tmp/huggingface
            volumes:
              - name: hf-cache
                emptyDir: {}
