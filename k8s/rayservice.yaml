apiVersion: v1
kind: Namespace
metadata:
  name: llm-chat
---
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: llm-chat
  namespace: llm-chat
spec:
  serviceUnhealthySecondThreshold: 900
  deploymentUnhealthySecondThreshold: 300
  serveConfigV2: |
    proxy_location: HeadOnly
    http_options:
      host: 0.0.0.0
      port: 8000
    applications:
      - name: llm-chat
        import_path: app.rag_server:rag_app
        route_prefix: /
        deployments:
          - name: RagApi
            num_replicas: 1
            max_ongoing_requests: 32
            ray_actor_options:
              num_cpus: 0.2
          - name: Embedder
            num_replicas: 1
            max_ongoing_requests: 8
            ray_actor_options:
              num_cpus: 0.5
  rayClusterConfig:
    rayVersion: "2.55.1"
    enableInTreeAutoscaling: false
    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "1.5"
      template:
        spec:
          nodeSelector:
            node-type: head
          tolerations:
            - key: ray-role
              operator: Equal
              value: head
              effect: NoSchedule
          containers:
            - name: ray-head
              image: __APP_IMAGE__
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 6379
                  name: gcs
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
                - containerPort: 8080
                  name: metrics
              env:
                - name: GRPC_DNS_RESOLVER
                  value: native
                - name: HF_HOME
                  value: /tmp/huggingface
                - name: EMBEDDER_MODEL_PATH
                  value: /models/embedder-onnx-int8
                - name: EMBEDDER_MODEL_ID
                  value: intfloat/multilingual-e5-small
                - name: EMBEDDER_NUM_THREADS
                  value: "1"
                - name: EMBEDDER_NUM_CPUS
                  value: "0.5"
                - name: RAG_API_NUM_CPUS
                  value: "0.2"
              resources:
                requests:
                  cpu: "1200m"
                  memory: 3Gi
                limits:
                  cpu: "1800m"
                  memory: 5Gi
              readinessProbe:
                httpGet:
                  path: /api/healthz
                  port: 52365
                initialDelaySeconds: 20
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
              volumeMounts:
                - name: hf-cache
                  mountPath: /tmp/huggingface
          volumes:
            - name: hf-cache
              emptyDir: {}
