apiVersion: v1
kind: Namespace
metadata:
  name: llm-chat
---
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: llm-chat
  namespace: llm-chat
spec:
  serviceUnhealthySecondThreshold: 900
  deploymentUnhealthySecondThreshold: 300
  serveConfigV2: |
    proxy_location: HeadOnly
    http_options:
      host: 0.0.0.0
      port: 8000
    applications:
      - name: llm-chat
        import_path: app.rag_server:rag_app
        route_prefix: /
        deployments:
          - name: RagApi
            num_replicas: 1
            max_ongoing_requests: 32
            ray_actor_options:
              num_cpus: 0.2
          - name: Embedder
            num_replicas: 1
            max_ongoing_requests: 8
            ray_actor_options:
              num_cpus: 0.5
  rayClusterConfig:
    rayVersion: "2.55.1"
    enableInTreeAutoscaling: false
    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "1"
      template:
        spec:
          nodeSelector:
            node-type: head
          containers:
            - name: ray-head
              image: __APP_IMAGE__
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 6379
                  name: gcs
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
                - containerPort: 8080
                  name: metrics
              env:
                - name: GRPC_DNS_RESOLVER
                  value: native
                - name: HF_HOME
                  value: /tmp/huggingface
                - name: EMBEDDER_MODEL_PATH
                  value: /models/embedder-onnx-int8
                - name: EMBEDDER_MODEL_ID
                  value: intfloat/multilingual-e5-small
                - name: EMBEDDER_NUM_THREADS
                  value: "1"
                - name: EMBEDDER_NUM_CPUS
                  value: "0.5"
                - name: RAG_API_NUM_CPUS
                  value: "0.2"
                # P5 — ingest pipeline
                - name: S3_BUCKET
                  value: __S3_BUCKET__
                - name: QDRANT_HOST
                  value: qdrant-0.qdrant.llm-chat.svc.cluster.local
                - name: QDRANT_HTTP_PORT
                  value: "6333"
                - name: QDRANT_GRPC_PORT
                  value: "6334"
                - name: QDRANT_COLLECTION
                  value: documents
                - name: CHUNK_SIZE_TOKENS
                  value: "500"
                - name: CHUNK_OVERLAP_TOKENS
                  value: "80"
                - name: INGEST_BATCH_SIZE
                  value: "32"
                - name: RAY_SERVE_APP_NAME
                  value: llm-chat
                # P6 — QA
                - name: VLLM_BASE_URL
                  value: http://vllm-server-0.vllm-server.llm-chat.svc.cluster.local:8000/v1
                - name: VLLM_MAX_MODEL_LEN
                  value: "8192"
                - name: QA_MAX_TOKENS
                  value: "160"
                # Drives "model" field in /qa structured logs. Update when
                # swapping underlying weights (e.g. 3b → 7b) so dashboards
                # and log queries can compare across switches.
                - name: MODEL_LABEL
                  value: "qwen2.5-3b-awq"
              resources:
                requests:
                  cpu: "900m"
                  memory: 3Gi
                limits:
                  cpu: "1500m"
                  memory: 5Gi
              readinessProbe:
                httpGet:
                  path: /api/healthz
                  port: 52365
                initialDelaySeconds: 20
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
              volumeMounts:
                - name: hf-cache
                  mountPath: /tmp/huggingface
          volumes:
            - name: hf-cache
              emptyDir: {}
