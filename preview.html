<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLM Chat</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f9f9f9;
      --panel: #ffffff;
      --ink: #333333;
      --muted: #888888;
      --line: #e5e5e5;
      --accent: #007aff;
      --accent-hover: #005bb5;
      --user-bg: #007aff;
      --user-text: #ffffff;
      --assistant-bg: #f1f1f1;
      --assistant-text: #333333;
      --radius: 18px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --panel: #1e1e1e;
        --ink: #e0e0e0;
        --muted: #aaaaaa;
        --line: #333333;
        --accent: #0a84ff;
        --accent-hover: #0066cc;
        --user-bg: #0a84ff;
        --user-text: #ffffff;
        --assistant-bg: #2d2d2d;
        --assistant-text: #e0e0e0;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .chat-container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--panel);
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--panel);
      z-index: 10;
    }
    h1 { font-size: 1.2rem; font-weight: 600; }
    .model { font-size: 0.85rem; color: var(--muted); }
    main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: 0.95rem;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .message.user {
      align-self: flex-end;
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: var(--assistant-bg);
      color: var(--assistant-text);
      border-bottom-left-radius: 4px;
    }
    .composer {
      padding: 16px 24px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    form {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      min-height: 44px;
      max-height: 150px;
      resize: none;
      padding: 12px 16px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.4;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: var(--accent);
    }
    button {
      height: 44px;
      width: 44px;
      flex-shrink: 0;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.2s, transform 0.1s;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:active:not(:disabled) { transform: scale(0.95); }
    button:disabled {
      background: var(--muted);
      cursor: not-allowed;
      opacity: 0.7;
    }
    button svg { width: 20px; height: 20px; fill: currentColor; transform: translateX(1px); }
    .error {
      color: #ff3b30;
      font-size: 0.85rem;
      margin-top: 8px;
      text-align: center;
      min-height: 20px;
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>
  <div class="chat-container">
    <header>
      <h1>LLM Chat</h1>
      <div class="model">Preview Model</div>
    </header>
    <main id="messages">
      <div class="message assistant">Xin chào! Sẵn sàng.</div>
      <div class="message user">Giao diện mới trông như thế nào nhỉ?</div>
      <div class="message assistant">Đây là bản xem trước! Trông xịn xò hơn hẳn phải không? Giao diện giờ bo góc dạng bong bóng chat, hỗ trợ dark mode và có nút gửi xịn xò. Bấm Enter là gửi ngay!</div>
    </main>
    <div class="composer">
      <form id="form">
        <textarea id="input" name="input" autocomplete="off" placeholder="Nhập tin nhắn... (Enter để gửi, Shift+Enter xuống dòng)" rows="1"></textarea>
        <button id="send" type="button" aria-label="Gửi">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </form>
      <div id="error" class="error"></div>
    </div>
  </div>
  <script>
    const input = document.getElementById("input");
    const messagesEl = document.getElementById("messages");

    input.addEventListener("input", function() {
      this.style.height = "44px";
      this.style.height = (this.scrollHeight) + "px";
    });
    
    // Auto scroll to bottom
    messagesEl.scrollTop = messagesEl.scrollHeight;
  </script>
</body>
</html>
